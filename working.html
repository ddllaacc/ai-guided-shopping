<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Guided Shopping — Experience Vision Screens</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#f5f3f0;font-family:'DM Sans',sans-serif;color:#1d1d1f;overflow-x:hidden}

/* ===== STICKY NAV ===== */
.story-nav{position:sticky;top:0;z-index:200;background:rgba(245,243,240,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,.06);padding:14px 40px;display:flex;gap:24px;align-items:center}
.story-nav button{font-size:13px;font-weight:600;color:#888;background:none;border:none;cursor:pointer;white-space:nowrap;padding:6px 14px;border-radius:18px;transition:all .2s;font-family:inherit}
.story-nav button:hover{color:#1d1d1f;background:rgba(0,0,0,.04)}
.story-nav button.active{color:#7B2D8E;background:rgba(123,45,142,.08)}
.story-nav .nav-label{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:#bbb;padding:6px 0}

/* ===== STORY SECTION ===== */
.story-section{padding:40px 0 60px;border-bottom:1px solid rgba(0,0,0,.06)}
.story-section:last-child{border-bottom:none}
.story-header{padding:0 40px 20px;max-width:700px}
.story-header h1{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:#999;margin-bottom:4px}
.story-header h2{font-size:22px;font-weight:700;margin-bottom:4px}
.story-header p{font-size:13px;color:#888;line-height:1.5}

.scroll-track{display:flex;align-items:flex-start;gap:48px;padding:0 40px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll-track::-webkit-scrollbar{display:none}

.screen-group{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.screen-label{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#aaa;margin-bottom:4px}
.screen-title{font-size:12px;font-weight:600;margin-bottom:12px;text-align:center;max-width:280px}

/* ===== IPHONE FRAME ===== */
.iphone{width:300px;height:640px;background:#fff;border-radius:48px;border:9px solid #1d1d1f;position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.13)}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 24px 0;height:46px;position:relative;z-index:10}
.status-time{font-size:15px;font-weight:600}
.status-icons{display:flex;gap:5px;align-items:center}
.dynamic-island{width:96px;height:26px;background:#1d1d1f;border-radius:20px;position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:20}
.screen-content{height:calc(100% - 46px - 80px);overflow-y:auto;position:relative}
.screen-content::-webkit-scrollbar{display:none}

/* Liquid glass nav */
.bottom-nav{position:absolute;bottom:10px;left:10px;right:10px;height:62px;background:rgba(255,255,255,.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:28px;border:1px solid rgba(255,255,255,.5);box-shadow:0 2px 16px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:space-between;padding:0 6px;z-index:10}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:500;color:#666;padding:6px 10px;border-radius:16px;min-width:44px}
.nav-item.active{color:#1d1d1f;background:rgba(0,0,0,.06)}
.ai-fab{width:56px;height:56px;border-radius:50%;background:#7B2D8E;border:3px solid rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(123,45,142,.3);flex-shrink:0}

/* ===== IMAGE PLACEHOLDERS ===== */
.img-ph{background:#c0c0c0 repeating-linear-gradient(45deg,transparent,transparent 14px,rgba(0,0,0,.08) 14px,rgba(0,0,0,.08) 15px);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:10px;color:#888;font-weight:500;text-align:center;padding:8px}
.img-ph::before,.img-ph::after{content:'';position:absolute;top:0;left:0;width:141.4%;height:1px;background:rgba(0,0,0,.15);transform-origin:0 0}
.img-ph::before{transform:rotate(33.7deg)}
.img-ph::after{transform:rotate(-33.7deg);top:auto;bottom:0;transform-origin:0 100%}
.img-ph-sq{width:120px;height:120px;border-radius:8px}
.img-ph-34{width:100%;aspect-ratio:4/3;border-radius:10px}
.img-ph-sm{width:52px;height:52px;border-radius:8px;font-size:7px}
.img-ph-cart{width:38px;height:38px;border-radius:6px;font-size:0}
.img-ph-mir{width:100%;height:48px;border-radius:6px;font-size:8px}
.img-ph-email{width:100%;height:78px;font-size:10px;color:#fff;font-weight:600}
.img-ph-next{width:100%;height:68px;font-size:10px;color:#666}

/* ===== HOMEPAGE COMPONENTS ===== */
.homepage-section{padding:16px 18px}
.hp-top-chips{display:flex;gap:8px;margin-bottom:16px}
.hp-chip{padding:8px 14px;border-radius:20px;border:1px solid #ddd;font-size:12px;font-weight:500;white-space:nowrap;background:#fff;display:flex;align-items:center;gap:6px}
.promo-banner{background:linear-gradient(135deg,#f5eef8,#ede5f3);padding:16px 18px;margin:0 -18px 16px;border-top:1px solid rgba(123,45,142,.06);border-bottom:1px solid rgba(123,45,142,.06)}
.promo-banner .label{font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#7B2D8E;margin-bottom:6px}
.promo-banner h3{font-size:17px;font-weight:700;margin-bottom:3px}
.promo-banner p{font-size:12px;color:#555;line-height:1.4}
.section-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.section-header h3{font-size:16px;font-weight:700}
.section-header a{font-size:12px;text-decoration:underline;font-weight:500;color:#1d1d1f}
.my-orders-card{border:1px solid #e0e0e0;border-radius:10px;padding:12px;display:flex;gap:12px;align-items:center;margin-bottom:16px}
.order-img{width:48px;height:48px;background:#e8e4e0;border-radius:6px;display:flex;align-items:center;justify-content:center}
.order-img .ph{width:22px;height:22px;border:2px solid #c0bab4;border-radius:3px}
.order-text h4{font-size:13px;font-weight:600}
.order-text a{font-size:11px;text-decoration:underline;color:#1d1d1f}
.product-row{display:flex;gap:10px}
.product-thumb{width:120px;flex-shrink:0}
.product-thumb .nm{font-size:11px;font-weight:500;line-height:1.3}
.product-thumb .pr{font-size:11px;font-weight:600;margin-top:2px}

/* ===== IMMERSIVE / CHAT ===== */
.immersive-bg{background:linear-gradient(180deg,#faf8fc,#f3eef8);min-height:100%;padding:10px 14px;display:flex;flex-direction:column}
.im-nav{display:flex;align-items:center;padding:2px 0 10px;position:sticky;top:0;z-index:5;background:linear-gradient(180deg,#faf8fc 80%,transparent)}
.bc{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center}
.im-nav .tt{font-size:14px;font-weight:700;flex:1;text-align:center}
.menu-btn{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-flow{display:flex;flex-direction:column;flex:1;padding-bottom:40px}
.cs{font-size:10px;font-weight:600;margin-bottom:4px;margin-top:4px}
.cb{max-width:90%;padding:11px 14px;font-size:12.5px;line-height:1.55;margin-bottom:6px}
.cb.ai{background:rgba(0,0,0,.04);border-radius:4px 16px 16px 16px}
.cb.user{background:#7B2D8E;color:#fff;align-self:flex-end;border-radius:16px 4px 16px 16px}
.pc{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.ch{padding:8px 14px;border-radius:20px;font-size:11px;font-weight:500;background:#fff;border:1px solid #ddd;white-space:nowrap}
.ch.pri{background:#7B2D8E;color:#fff;border-color:#7B2D8E}
.pcc{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:10px 12px;margin:3px 0;display:flex;gap:10px;align-items:center}
.pci-info h4{font-size:12px;font-weight:600;margin-bottom:1px}
.pci-info .pl{font-size:12px;font-weight:700}
.pci-info .rat{font-size:9.5px;color:#7B2D8E;margin-top:2px;font-style:italic}
.pci-info .rt{font-size:9.5px;color:#888}
.mo{display:flex;gap:7px;margin:6px 0}
.moi{flex:1;background:#fff;border:1.5px solid #e0e0e0;border-radius:10px;padding:8px 6px;text-align:center}
.moi.pk{border-color:#7B2D8E;background:#faf6fc;box-shadow:0 0 0 1px #7B2D8E}
.moi .nm{font-size:9px;font-weight:500}
.moi .pr{font-size:9px;font-weight:700;margin-top:1px}
.ib{display:flex;gap:8px;padding:10px 14px 4px;position:sticky;bottom:0;background:linear-gradient(0deg,#f3eef8 60%,transparent)}
.if{flex:1;padding:10px 14px;background:#fff;border:1px solid #ddd;border-radius:22px;font-size:12px;color:#aaa}
.sb{width:34px;height:34px;border-radius:50%;background:#7B2D8E;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ===== CART ===== */
.cn{display:flex;align-items:center;padding:8px 18px;gap:12px}
.cn .tt{font-size:15px;font-weight:700;flex:1;text-align:center;padding-right:30px}
.cg{background:#f9f6fc;border:1px solid #ece5f3;border-radius:12px;padding:14px;margin:10px 18px}
.cg .gl{font-size:10px;font-weight:700;color:#7B2D8E;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.ci{display:flex;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid #f0ebf5}
.ci:last-child{border-bottom:none}
.cin{font-size:11px;font-weight:500;flex:1}
.cip{font-size:11px;font-weight:700}
.di{background:#eef6ee;border-radius:10px;padding:12px 14px;margin:10px 18px;font-size:11px;color:#2a6a2a;line-height:1.5}
.ct{display:flex;justify-content:space-between;padding:14px 18px;font-size:15px;font-weight:700}
.cob{margin:6px 18px 18px;padding:14px;background:#1d1d1f;color:#fff;border-radius:10px;font-size:14px;font-weight:600;text-align:center}

/* ===== EMAIL ===== */
.ebg{background:#ece8e3;min-height:100%}
.ehb{background:#7B2D8E;padding:18px 16px;text-align:center}
.ehb .logo{font-size:17px;font-weight:700;color:#fff}
.ebody{background:#fff;margin:0 12px;border-radius:0 0 14px 14px;padding:18px 16px}
.ebody h2{font-size:19px;font-weight:700;text-align:center;margin-bottom:4px}
.ebody .sub{font-size:12px;color:#888;text-align:center;margin-bottom:16px}
.cr{display:flex;gap:8px;margin-bottom:18px}
.cri{flex:1;border-radius:10px;overflow:hidden;border:1px solid #eee}
.cri .rl{font-size:10px;font-weight:600;text-align:center;padding:6px 0;background:#fafafa}
.wn h3{font-size:15px;font-weight:700;margin-bottom:3px}
.wn p{font-size:11px;color:#888;margin-bottom:12px;line-height:1.4}
.nrc{background:#f8f5fc;border-radius:10px;overflow:hidden;margin-bottom:8px;border:1px solid #ece5f3}
.nrc .cta{display:flex;justify-content:space-between;align-items:center;padding:9px 12px}
.nrc .cta span{font-size:12px;font-weight:600}
.nrc .cta .arr{font-size:16px;color:#7B2D8E;font-weight:700}

/* ===== MAIL APP UI ===== */
.mail-app{background:#fff;min-height:100%;display:flex;flex-direction:column}
.mail-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #e8e8e8}
.mail-back{font-size:28px;font-weight:300;color:#1d1d1f;cursor:pointer}
.mail-actions{display:flex;gap:16px;align-items:center}
.mail-subject{font-size:18px;font-weight:600;padding:12px 16px;line-height:1.3}
.mail-sender{display:flex;gap:12px;padding:8px 16px 12px;border-bottom:1px solid #e8e8e8}
.sender-avatar{flex-shrink:0}
.sender-info{flex:1}
.sender-name{font-size:13px;font-weight:600;margin-bottom:2px}
.sender-to{font-size:12px;color:#888}
.mail-body{flex:1;overflow-y:auto;background:#f5f5f5}
.mail-footer{display:flex;gap:8px;padding:12px 16px;background:#fff;border-top:1px solid #e8e8e8}
.mail-btn{flex:1;padding:12px;border:1px solid #e0e0e0;border-radius:24px;background:#fff;font-size:13px;font-weight:500;cursor:pointer}

/* ===== TABLES ===== */
.choice-tbl{width:100%;border-collapse:collapse;font-size:10px;margin:6px 0;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e8e8e8}
.choice-tbl th{background:#f5f3f0;text-align:left;padding:6px 8px;font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:.03em;color:#666}
.choice-tbl td{padding:6px 8px;border-top:1px solid #f0f0f0;font-size:10px}
.choice-tbl td:first-child{font-weight:600;color:#666;font-size:9px}
.choice-tbl .rec{background:#f8f5fc;font-weight:600;color:#7B2D8E}

/* ===== PDP ===== */
.pdp-section{padding:0 16px}
.pdp-title{font-size:15px;font-weight:700;margin:10px 0 2px}
.pdp-price{font-size:14px;font-weight:700;margin-bottom:8px}
.pdp-specs{font-size:10px;color:#666;line-height:1.5;margin-bottom:10px}
.ai-highlight{background:#f8f5fc;border:1px solid #ece5f3;border-radius:10px;padding:10px 12px;margin-bottom:8px}
.ai-highlight .hl-label{font-size:9px;font-weight:700;color:#7B2D8E;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.ai-highlight .hl-item{font-size:10.5px;line-height:1.5;margin-bottom:4px;padding-left:14px;position:relative}
.ai-highlight .hl-item::before{content:'✓';position:absolute;left:0;color:#7B2D8E;font-weight:700;font-size:10px}
.review-summary{background:#f8f8f8;border:1px solid #eee;border-radius:10px;padding:10px 12px;margin-bottom:8px}
.review-summary .rs-label{font-size:9px;font-weight:700;color:#1d1d1f;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.review-summary .rs-item{font-size:10.5px;line-height:1.5;margin-bottom:3px}

/* ===== MISC COMPONENTS ===== */
.ctx-entry{background:linear-gradient(135deg,#f5eef8,#ede5f3);border-radius:12px;padding:12px 14px;margin:2px 14px 12px}
.ctx-entry h4{font-size:13px;font-weight:700;margin-bottom:4px}
.ctx-entry p{font-size:11px;color:#555;margin-bottom:8px}
.upload-area{border:2px dashed #ccc;border-radius:10px;padding:16px;text-align:center;margin:6px 0}
.upload-area .icon{font-size:20px;margin-bottom:4px}
.upload-area .txt{font-size:11px;color:#888}
.intake-form{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:12px;margin:6px 0}
.intake-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:11px;gap:12px}
.intake-row:last-child{border-bottom:none}
.intake-row .lbl{font-weight:600;color:#666;font-size:10px;flex-shrink:0}
.intake-row .val{color:#1d1d1f;font-weight:500;text-align:right;max-width:150px;line-height:1.4}
.intake-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.intake-header h4{font-size:11px;font-weight:700;margin:0}
.intake-header .edit-icon{width:16px;height:16px;opacity:0.5;cursor:pointer}
.intake-header .edit-icon:hover{opacity:1}

/* Bottom sheet for questionnaire */
.sheet-backdrop{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:100}
.bottom-sheet{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 24px;box-shadow:0 -4px 20px rgba(0,0,0,0.15);z-index:101}
.sheet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.sheet-progress{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.05em}
.sheet-skip{font-size:12px;color:#7B2D8E;font-weight:600;cursor:pointer}
.sheet-question{font-size:14px;font-weight:700;margin-bottom:12px;line-height:1.4}
.sheet-options{display:flex;flex-direction:column;gap:8px}
.sheet-option{background:#f5f5f5;border:1px solid #e8e8e8;border-radius:10px;padding:12px 14px;font-size:12px;cursor:pointer;transition:all 0.2s}
.sheet-option:hover{background:#ebebeb}
.sheet-option.selected{background:#f8f5fc;border-color:#7B2D8E;color:#7B2D8E;font-weight:600}

/* ===== CONNECTORS & NOTES ===== */
.conn{display:flex;align-items:center;flex-shrink:0;padding-top:50px}
.conn svg{width:28px;height:28px;opacity:.2}
.sn{margin-top:10px;font-size:10px;color:#999;text-align:center;max-width:260px;line-height:1.5;font-style:italic;margin-bottom:4px}

/* ===== ANIMATED PHONE ===== */
.anim-group{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.anim-group .screen-meta{text-align:center;margin-top:10px;min-height:44px}
.anim-group .meta-label{font-size:9px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#aaa;margin-bottom:2px}
.anim-group .meta-desc{font-size:11px;font-weight:500;color:#666;max-width:260px;line-height:1.4}
.anim-group .progress-bar{display:flex;gap:3px;justify-content:center;margin-top:10px}
.anim-group .progress-dot{width:24px;height:3px;border-radius:2px;background:rgba(0,0,0,.1);cursor:pointer;transition:background .3s}
.anim-group .progress-dot.active{background:#7B2D8E}
.anim-group .progress-dot.past{background:rgba(0,0,0,.2)}
.anim-group .anim-controls{display:flex;gap:8px;justify-content:center;margin-top:8px}
.anim-group .ctrl-btn{width:28px;height:28px;border-radius:50%;border:1px solid rgba(0,0,0,.15);background:none;color:#999;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s}
.anim-group .ctrl-btn:hover{border-color:#999;color:#1d1d1f}
.anim-group .ctrl-btn.pp{border-color:#7B2D8E;color:#7B2D8E}
.anim-group .ctrl-btn.pp:hover{background:#7B2D8E;color:#fff}

/* Screen swap for non-chat slides */
.anim-phone .screen-swap{position:absolute;top:0;left:0;right:0;bottom:0;opacity:0;transition:opacity .4s ease;pointer-events:none;overflow-y:auto}
.anim-phone .screen-swap::-webkit-scrollbar{display:none}
.anim-phone .screen-swap.active{opacity:1;pointer-events:auto}

/* Chat message animation */
.chat-msg{opacity:0;transform:translateY(16px);max-height:0;overflow:visible;transition:opacity .4s ease,transform .4s ease,max-height .5s ease,margin .3s ease;margin-bottom:0;display:flex;flex-direction:column}
.chat-msg.shown{opacity:1;transform:translateY(0);max-height:500px;margin-bottom:6px}
.chat-msg:has(.cb.user){align-items:flex-end}
.chat-msg:has(.cb.user) .cb.user{align-self:flex-end}
.chat-msg.user-msg{align-items:flex-end}
.chat-msg.user-msg .cb.user{align-self:flex-end}

/* ===== EXPAND BUTTON ===== */
.anim-title-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.anim-title-row .screen-title{margin-bottom:0}
.expand-btn{width:28px;height:28px;border-radius:50%;border:1px solid rgba(0,0,0,.12);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.expand-btn:hover{background:rgba(123,45,142,.08);border-color:#7B2D8E}
.expand-btn svg{width:14px;height:14px;stroke:#888;transition:stroke .2s}
.expand-btn:hover svg{stroke:#7B2D8E}

/* ===== FULLSCREEN MODAL ===== */
.anim-modal{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s ease}
.anim-modal.open{opacity:1;pointer-events:auto}
.anim-modal .modal-header{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:20px 32px}
.anim-modal .modal-title{color:#fff;font-size:14px;font-weight:600}
.anim-modal .modal-subtitle{color:rgba(255,255,255,.5);font-size:11px;margin-top:2px}
.modal-close{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;font-family:inherit}
.modal-close:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.4)}
.anim-modal .modal-body{display:flex;flex-direction:column;align-items:center;gap:16px}
.anim-modal .modal-meta{text-align:center;min-height:44px}
.anim-modal .modal-meta-label{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:2px}
.anim-modal .modal-meta-desc{font-size:13px;font-weight:500;color:rgba(255,255,255,.8);max-width:320px;line-height:1.4}
.anim-modal .modal-progress{display:flex;gap:4px;justify-content:center}
.anim-modal .modal-dot{width:28px;height:3px;border-radius:2px;background:rgba(255,255,255,.15);cursor:pointer;transition:background .3s}
.anim-modal .modal-dot.active{background:#7B2D8E}
.anim-modal .modal-dot.past{background:rgba(255,255,255,.3)}

.anim-modal .m-ctrl:hover{border-color:rgba(255,255,255,.5);color:#fff}

.anim-modal .m-ctrl.m-pp:hover{background:#7B2D8E;color:#fff}
.anim-modal .esc-hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.04em}

.story-divider{display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;padding:0 60px;min-height:500px;position:relative}
.story-divider .divider-line{width:1px;height:80px;background:linear-gradient(180deg,transparent,rgba(0,0,0,.12),transparent);margin-bottom:20px}

// =====================================================
// ANIMATION ENGINE — continuous chat scrolling
// =====================================================
document.querySelectorAll('.anim-phone').forEach(phoneEl => {
  const group = phoneEl.closest('.anim-group');
  const storyKey = phoneEl.getAttribute('data-story');
  const moments = STORIES[storyKey].moments;
  const sc = phoneEl.querySelector('[data-anim-sc]');
  const metaLabel = group.querySelector('[data-meta-label]');
  const metaDesc = group.querySelector('[data-meta-desc]');
  const progressBar = group.querySelector('[data-progress]');
  const ppBtn = group.querySelector('[data-pp]');
  const prevBtn = group.querySelector('[data-prev]');
  const nextBtn = group.querySelector('[data-next]');

  let current = 0, playing = true, timer = null, itemTimers = [];
  let chatContainer = null; // the running chat-flow div

  // Build progress dots
  moments.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'progress-dot' + (i===0?' active':'');
    dot.addEventListener('click', () => goTo(i));
    progressBar.appendChild(dot);
  });
  const dots = progressBar.querySelectorAll('.progress-dot');

  function clearTimers(){ itemTimers.forEach(t=>clearTimeout(t)); itemTimers=[]; clearTimeout(timer); }

  function updateMeta(idx){
    metaLabel.textContent = `${idx+1} of ${moments.length}`;
    metaDesc.textContent = moments[idx].desc;
    dots.forEach((d,i)=>{ d.classList.remove('active','past'); if(i===idx) d.classList.add('active'); else if(i<idx) d.classList.add('past'); });
  }

  function getMaxItemDelay(m){
    if(!m.items) return 0;
    return Math.max(...m.items.map(i=>i.delay));
  }

  function showMoment(idx){
    clearTimers();
    current = idx;
    const m = moments[idx];
    updateMeta(idx);

    if(m.type === 'screen'){
      // Full screen swap
      chatContainer = null;
      sc.innerHTML = m.html;
      // Inject back buttons in the new content
      sc.querySelectorAll('.bc').forEach(b=>{ if(!b.innerHTML.trim()) b.innerHTML=BACK_SVG; });
    }
    else if(m.type === 'chat-start'){
      // Start a new chat conversation
      sc.innerHTML = `<div class="immersive-bg">${imNav()}<div class="chat-flow" data-chat-flow></div></div>`;
      sc.querySelectorAll('.bc').forEach(b=>{ if(!b.innerHTML.trim()) b.innerHTML=BACK_SVG; });
      chatContainer = sc.querySelector('[data-chat-flow]');
      appendChatItems(m);
    }
    else if(m.type === 'chat-continue'){
      // Append to existing chat
      if(!chatContainer){
        // Fallback: start fresh if somehow no container
        sc.innerHTML = `<div class="immersive-bg">${imNav()}<div class="chat-flow" data-chat-flow></div></div>`;
        sc.querySelectorAll('.bc').forEach(b=>{ if(!b.innerHTML.trim()) b.innerHTML=BACK_SVG; });
        chatContainer = sc.querySelector('[data-chat-flow]');
      }
      appendChatItems(m);
    }
  }

  function appendChatItems(m){
    if(!m.items || !chatContainer) return;
    m.items.forEach(item => {
      const wrapper = document.createElement('div');
      wrapper.className = 'chat-msg';
      wrapper.innerHTML = item.html;
      // Tag user messages for right-alignment
      if(item.html.includes('cb user')) wrapper.classList.add('user-msg');
      chatContainer.appendChild(wrapper);

      const t = setTimeout(()=>{
        wrapper.classList.add('shown');
        // Scroll to bottom
        sc.scrollTo({top: sc.scrollHeight, behavior:'smooth'});
      }, item.delay + 100);
      itemTimers.push(t);
    });
  }

  function scheduleNext(){
    if(!playing) return;
    const m = moments[current];
    const itemTime = m.items ? getMaxItemDelay(m) + 600 : 0;
    const holdTime = m.hold || 3000;
    timer = setTimeout(()=>{
      const next = current < moments.length - 1 ? current + 1 : 0;
      if(next === 0) chatContainer = null; // reset on loop
      showMoment(next);
      scheduleNext();
    }, itemTime + holdTime);
  }

  function goTo(idx){
    clearTimers();
    // If going backwards or to a screen, need to rebuild chat from scratch
    if(idx <= current || moments[idx].type === 'screen' || idx === 0){
      chatContainer = null;
      // Replay all chat moments up to idx to rebuild state
      let startFrom = 0;
      for(let i = idx; i >= 0; i--){
        if(moments[i].type === 'screen' || moments[i].type === 'chat-start'){
          startFrom = i;
          break;
        }
      }
      // Instantly render moments from startFrom to idx-1, then animate idx
      for(let i = startFrom; i < idx; i++){
        showMomentInstant(i);
      }
      showMoment(idx);
    } else {
      showMoment(idx);
    }
    if(playing) scheduleNext();
  }

  function showMomentInstant(idx){
    const m = moments[idx];
    if(m.type === 'screen'){
      chatContainer = null;
      sc.innerHTML = m.html;
      sc.querySelectorAll('.bc').forEach(b=>{ if(!b.innerHTML.trim()) b.innerHTML=BACK_SVG; });
    }
    else if(m.type === 'chat-start'){
      sc.innerHTML = `<div class="immersive-bg">${imNav()}<div class="chat-flow" data-chat-flow></div></div>`;
      sc.querySelectorAll('.bc').forEach(b=>{ if(!b.innerHTML.trim()) b.innerHTML=BACK_SVG; });
      chatContainer = sc.querySelector('[data-chat-flow]');
      if(m.items) m.items.forEach(item=>{
        const w = document.createElement('div');
        w.className = 'chat-msg shown';
        if(item.html.includes('cb user')) w.classList.add('user-msg');
        w.innerHTML = item.html;
        chatContainer.appendChild(w);
      });
    }
    else if(m.type === 'chat-continue'){
      if(!chatContainer) return;
      if(m.items) m.items.forEach(item=>{
        const w = document.createElement('div');
        w.className = 'chat-msg shown';
        if(item.html.includes('cb user')) w.classList.add('user-msg');
        w.innerHTML = item.html;
        chatContainer.appendChild(w);
      });
    }
  }

  ppBtn.addEventListener('click',()=>{
    playing=!playing;
    ppBtn.textContent = playing?'❚❚':'▶';
    if(playing) scheduleNext(); else clearTimers();
  });
  prevBtn.addEventListener('click',()=>goTo(current>0?current-1:moments.length-1));
  nextBtn.addEventListener('click',()=>goTo(current<moments.length-1?current+1:0));

  // Only auto-play when visible
  const visObs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting && playing){ showMoment(current); scheduleNext(); }
      else { clearTimers(); }
    });
  },{threshold:0.3});
  visObs.observe(phoneEl);

  showMoment(0);
});

    });
  } else if(m.type==='chat-continue'){
    if(!modalChatContainer) return;
    if(m.items) m.items.forEach(item=>{
      const w=document.createElement('div'); w.className='chat-msg shown';
      if(item.html.includes('cb user')) w.classList.add('user-msg');
      w.innerHTML=item.html; modalChatContainer.appendChild(w);
    });
  }
}

function modalScheduleNext(){
  if(!modalPlaying) return;
  const m = STORIES[modalStory].moments[modalCurrent];
  const itemTime = m.items ? modalGetMaxDelay(m)+600 : 0;
  const holdTime = m.hold||3000;
  modalTimer = setTimeout(()=>{
    const moments = STORIES[modalStory].moments;
    const next = modalCurrent < moments.length-1 ? modalCurrent+1 : 0;
    if(next===0) modalChatContainer=null;
    modalShowMoment(next);
    modalScheduleNext();
  }, itemTime+holdTime);
}

function modalGoTo(idx){
  modalClearTimers();
  const moments = STORIES[modalStory].moments;
  if(idx<=modalCurrent || moments[idx].type==='screen' || idx===0){
    modalChatContainer=null;
    let startFrom=0;
    for(let i=idx;i>=0;i--){
      if(moments[i].type==='screen'||moments[i].type==='chat-start'){ startFrom=i; break; }
    }
    for(let i=startFrom;i<idx;i++) modalShowInstant(i);
    modalShowMoment(idx);
  } else {
    modalShowMoment(idx);
  }
  if(modalPlaying) modalScheduleNext();
}

function openModal(storyKey){
  modalStory = storyKey;
  modalCurrent = 0;
  modalPlaying = true;
  modalChatContainer = null;
  modalPP.textContent = '❚❚';

  const s = STORIES[storyKey];
  modalTitle.textContent = s.title;
  modalSubtitle.textContent = s.num;

  // Build progress dots
  modalProgress.innerHTML = '';
  s.moments.forEach((_,i)=>{
    const dot = document.createElement('div');
    dot.className = 'modal-dot'+(i===0?' active':'');
    dot.addEventListener('click',()=>modalGoTo(i));
    modalProgress.appendChild(dot);
  });

  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
  modalShowMoment(0);
  modalScheduleNext();
}

function closeModal(){
  modal.classList.remove('open');
  document.body.style.overflow = '';
  modalClearTimers();
  modalStory = null;
}

// Event listeners
document.querySelectorAll('[data-expand]').forEach(btn=>{
  btn.addEventListener('click',()=> openModal(btn.getAttribute('data-expand')));
});

modalCloseBtn.addEventListener('click', closeModal);

modalPP.addEventListener('click',()=>{
  modalPlaying=!modalPlaying;
  modalPP.textContent=modalPlaying?'❚❚':'▶';
  if(modalPlaying) modalScheduleNext(); else modalClearTimers();
});
modalPrev.addEventListener('click',()=>{
  const len=STORIES[modalStory].moments.length;
  modalGoTo(modalCurrent>0?modalCurrent-1:len-1);
});
modalNext.addEventListener('click',()=>{
  const len=STORIES[modalStory].moments.length;
  modalGoTo(modalCurrent<len-1?modalCurrent+1:0);
});

document.addEventListener('keydown',e=>{
  if(!modal.classList.contains('open')) return;
  if(e.key==='Escape') closeModal();
  if(e.key==='ArrowRight'){
    e.preventDefault();
    const len=STORIES[modalStory].moments.length;
    modalGoTo(modalCurrent<len-1?modalCurrent+1:0);
  }
  if(e.key==='ArrowLeft'){
    e.preventDefault();
    const len=STORIES[modalStory].moments.length;
    modalGoTo(modalCurrent>0?modalCurrent-1:len-1);
  }
  if(e.key===' '){
    e.preventDefault();
    modalPlaying=!modalPlaying;
    modalPP.textContent=modalPlaying?'❚❚':'▶';
    if(modalPlaying) modalScheduleNext(); else modalClearTimers();
  }
});
</script>
</body>
</html>
